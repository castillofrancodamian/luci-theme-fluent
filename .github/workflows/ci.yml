name: CI

on:
  push:
    branches: [main, openwrt-24.10]
  pull_request:
    branches: [main, openwrt-24.10]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare CI source
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - id: meta
        name: Resolve CI version
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          BASE_VERSION=$(sed -n 's/^PKG_VERSION:=//p' package/luci-theme-fluent/Makefile)
          SHORT_SHA=$(printf '%.7s' "$SHA")
          if [ "$EVENT_NAME" = "pull_request" ]; then
            VERSION="${BASE_VERSION}-pr${PR_NUMBER}-${SHORT_SHA}"
          else
            VERSION="${BASE_VERSION}-dev-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using CI version ${VERSION}"


      - name: Pack prepared source
        run: tar --exclude=.git -czf "$RUNNER_TEMP/ci-source.tar.gz" .

      - name: Upload prepared source
        uses: actions/upload-artifact@v7
        with:
          name: ci-source-${{ github.run_id }}
          path: ${{ runner.temp }}/ci-source.tar.gz

  assets:
    name: Build minified assets
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@v8
        with:
          name: ci-source-${{ github.run_id }}

      - name: Extract prepared source
        run: tar -xzf ci-source.tar.gz

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build minified CSS & JS
        env:
          RSBUILD_MINIFY: "true"
        run: pnpm run build

      - name: Verify built assets
        run: |
          test -s package/luci-theme-fluent/htdocs/luci-static/fluent/css/fluent.css
          test -s package/luci-theme-fluent/htdocs/luci-static/resources/menu-fluent.js
          test -s package/luci-theme-fluent/htdocs/luci-static/resources/view/fluent-config.js
          css_size=$(wc -c < package/luci-theme-fluent/htdocs/luci-static/fluent/css/fluent.css)
          menu_size=$(wc -c < package/luci-theme-fluent/htdocs/luci-static/resources/menu-fluent.js)
          config_size=$(wc -c < package/luci-theme-fluent/htdocs/luci-static/resources/view/fluent-config.js)
          echo "Built fluent.css (${css_size} bytes)"
          echo "Built menu-fluent.js (${menu_size} bytes)"
          echo "Built fluent-config.js (${config_size} bytes)"

      - name: Upload built assets
        uses: actions/upload-artifact@v7
        with:
          name: fluent-assets
          path: |
            package/luci-theme-fluent/htdocs/luci-static/fluent/css/fluent.css
            package/luci-theme-fluent/htdocs/luci-static/resources/menu-fluent.js
            package/luci-theme-fluent/htdocs/luci-static/resources/view/fluent-config.js

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint with Biome
        run: pnpm run lint || true

  openwrt-sdk:
    name: OpenWrt SDK Build (${{ matrix.version }})
    needs: assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['24.10.7', '25.12.4']
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@v8
        with:
          name: ci-source-${{ github.run_id }}

      - name: Extract prepared source
        run: tar -xzf ci-source.tar.gz

      - name: Download built assets
        uses: actions/download-artifact@v8
        with:
          name: fluent-assets
          path: package/luci-theme-fluent/htdocs/luci-static

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd wget

      - name: Prepare package sources
        run: |
          mkdir -p ${HOME}/builder/packages
          cp -r "$PWD/package/luci-theme-fluent" "${HOME}/builder/packages/luci-theme-fluent"
          echo "Staged packages:"
          ls -la ${HOME}/builder/packages/

      - name: Build packages
        run: |
          chmod +x .github/workflows/build.sh
          bash .github/workflows/build.sh "${{ matrix.version }}"

      - name: Collect built packages
        run: |
          mkdir -p output
          cp ${HOME}/builder/output/luci-theme-fluent*.ipk output/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-theme-fluent*.apk output/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-i18n-fluent*.ipk output/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-i18n-fluent*.apk output/ 2>/dev/null || true
          echo "Built packages:"
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-openwrt-${{ matrix.version }}
          path: |
            output/luci-theme-fluent*.ipk
            output/luci-theme-fluent*.apk
            output/luci-i18n-fluent*.ipk
            output/luci-i18n-fluent*.apk
          if-no-files-found: warn

  nightly:
    name: Nightly Release
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/openwrt-24.10')
    needs: [prepare, openwrt-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v8
        with:
          path: packages/
          pattern: packages-openwrt-*
          merge-multiple: true
      - name: List packages
        run: |
          echo "Nightly packages:"
          find packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec ls -lh {} \;
      - name: Delete existing nightly tag
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: nightly
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: "Nightly Build"
          overwrite_files: true
          body: |
            ## LuCI Theme Fluent - Nightly Build

            Automatic build for package version `${{ needs.prepare.outputs.version }}` from commit `${{ github.sha }}`.

            ### Packages
            - `luci-theme-fluent` — FluentUI theme for OpenWrt LuCI
            - `luci-i18n-fluent` — Translations

            ### Installation

            **OpenWrt 24.10.x (opkg/ipk):**
            ```bash
            opkg install luci-theme-fluent_*.ipk
            ```

            **OpenWrt 25.12.x (apk):**
            ```bash
            apk add luci-theme-fluent_*.apk
            ```
          files: |
            packages/**/*.ipk
            packages/**/*.apk
          prerelease: true
